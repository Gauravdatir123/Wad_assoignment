<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>

    <!-- Link CSS file -->
    <link rel="stylesheet" href="Practical1.css">
</head>
<body>

    <div class="sidebar">
        <h2>Dashboard</h2>
        <ul>
            <li>Home</li>
            <li>Students</li>
            <li>Exams</li>
            <li>Results</li>
            <li>Settings</li>
        </ul>
    </div>

    <div class="main">
        <div class="header">Exam Admin Dashboard</div>

        <div class="cards">
            <div class="card">
                <h3>Total Students</h3>
                <p>1200</p>
            </div>
            <div class="card">
                <h3>Exams Conducted</h3>
                <p>35</p>
            </div>
            <div class="card">
                <h3>Results Published</h3>
                <p>30</p>
            </div>
            <div class="card">
                <h3>Pending Exams</h3>
                <p>5</p>
            </div>
        </div>
    </div>

</body>
</html>
